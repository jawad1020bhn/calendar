<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | The Daily Tracker</title>
    <style>
        :root {
            --bg: #181716;
            --text: #EAE6DF;
            --dim: #88837C;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-style: italic;
            margin-bottom: 1rem;
        }
        p {
            color: var(--dim);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        button {
            background: none;
            border: 1px solid var(--dim);
            color: var(--text);
            padding: 0.8rem 2rem;
            cursor: pointer;
            font-family: sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }
        button:hover {
            border-color: var(--text);
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Offline</h1>
        <p>This record is currently resting. Please check your connection to sync historical assets, or continue using the cached app shell.</p>
        <button onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
