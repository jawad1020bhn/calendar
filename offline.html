<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Interrupted // The Daily Tracker</title>
    <style>
        :root {
            --bg: #181716;
            --text: #EAE6DF;
            --dim: #88837C;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Epilogue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 2rem;
        }
        .content {
            max-width: 400px;
            animation: fadeIn 1.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            color: var(--dim);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border: 1px solid var(--text);
            color: var(--text);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--text);
            color: var(--bg);
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Offline</h1>
        <p>You are currently disconnected from the wider web. However, your local archival record remains fully accessible and functional.</p>
        <a href="./index.html" class="btn">Return to Tracker</a>
    </div>
</body>
</html>
